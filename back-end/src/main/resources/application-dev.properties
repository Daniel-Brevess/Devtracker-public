spring.datasource.url=${DEVTRACKER_DB_URL:jdbc:postgresql://localhost:5432/devtracker}
spring.datasource.username=${DEVTRACKER_DB_USERNAME:postgres}
spring.datasource.password=${DEVTRACKER_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:devtracker-local-jwt-secret-change-me-32-characters}

github.oauth.client-id=${GITHUB_CLIENT_ID:}
github.oauth.client-secret=${GITHUB_CLIENT_SECRET:}
github.oauth.redirect-uri=${GITHUB_OAUTH_REDIRECT_URI:http://localhost:8080/auth/github/callback}
github.token.encryption-secret=${GITHUB_TOKEN_ENCRYPTION_SECRET:devtracker-local-github-token-secret-change-me}
app.frontend.auth-callback-url=${FRONTEND_AUTH_CALLBACK_URL:http://localhost:5173/auth/callback}
app.cors.allowed-origins=${DEVTRACKER_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
app.admin.emails=${DEVTRACKER_ADMIN_EMAILS:}
