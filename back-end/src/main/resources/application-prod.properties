spring.datasource.url=${DEVTRACKER_DB_URL}
spring.datasource.username=${DEVTRACKER_DB_USERNAME}
spring.datasource.password=${DEVTRACKER_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET}

github.oauth.client-id=${GITHUB_CLIENT_ID}
github.oauth.client-secret=${GITHUB_CLIENT_SECRET}
github.oauth.redirect-uri=${GITHUB_OAUTH_REDIRECT_URI}
github.token.encryption-secret=${GITHUB_TOKEN_ENCRYPTION_SECRET}
app.frontend.auth-callback-url=${FRONTEND_AUTH_CALLBACK_URL}
